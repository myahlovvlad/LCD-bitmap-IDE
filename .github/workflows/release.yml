name: Release

# Builds desktop distributables on native runners so Linux and Windows
# artifacts are always reproducible regardless of the developer's host OS.
# Trigger by pushing a v* tag, or run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lcd-bitmap-ide-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
          if-no-files-found: ignore

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
          fail_on_unmatched_files: false
