name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Full browser acceptance gate
        run: npm run check

      - name: Development server smoke
        run: npm run test:dev

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Electron smoke on Windows
        if: runner.os == 'Windows'
        run: npm run test:electron

      - name: Electron smoke on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:electron

      - name: Performance budgets
        if: runner.os == 'Windows'
        run: npm run test:performance

      - name: Packaged Windows smoke
        if: runner.os == 'Windows'
        run: npm run test:package:win

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
